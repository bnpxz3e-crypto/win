<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วินเลข</title>

<style>
body {
    font-family: "Prompt", sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: #fff;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #ffffff;
    color: #000;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 15px;
    font-size: 20px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #ddd;
}

.buttons {
    margin-top: 15px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn-main { background:#28a745; color:#fff; }
.btn-secondary { background:#007bff; color:#fff; }
.btn-danger { background:#dc3545; color:#fff; }

.result-box {
    margin-top: 20px;
    text-align: left;
}

.block {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 10px;
    background: #f4f4f4;
}

.title {
    font-weight: bold;
    margin-bottom: 10px;
}

.copy {
    margin-top: 10px;
    background:#000;
    color:#fff;
}

.numbers {
    word-break: break-word;
}
</style>
</head>

<body>
<div class="container">
    <h1>โปรแกรมวินเลข</h1>
    <p>รองรับเลขซ้ำ เช่น 125032</p>

    <input id="input" placeholder="กรอกตัวเลข..." oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <div class="buttons">
        <button class="btn-main" onclick="generate()">วินเลข</button>
        <button class="btn-secondary" onclick="run2()">ชุดลาก</button>
        <button class="btn-danger" onclick="clearAll()">ล้าง</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
function uniqueCombo(arr, size) {
    const result = [];

    function helper(start, path) {
        if (path.length === size) {
            result.push(path.join(''));
            return;
        }

        for (let i = start; i < arr.length; i++) {
            path.push(arr[i]);
            helper(i + 1, path);
            path.pop();
        }
    }

    helper(0, []);
    return result;
}

function comboWithRepeat(arr, size) {
    const result = [];

    function helper(start, path) {
        if (path.length === size) {
            result.push(path.join(''));
            return;
        }

        for (let i = start; i < arr.length; i++) {
            path.push(arr[i]);
            helper(i, path);
            path.pop();
        }
    }

    helper(0, []);
    return result;
}

function copy(text) {
    navigator.clipboard.writeText(text);
    alert("คัดลอกแล้ว");
}

function block(title, data) {
    const str = data.join('-');
    return `
    <div class="block">
        <div class="title">${title} (${data.length})</div>
        <div class="numbers">${str}</div>
        <button class="copy" onclick='copy(${JSON.stringify(str)})'>คัดลอก</button>
    </div>`;
}

function generate() {
    const val = document.getElementById('input').value;
    if (val.length < 3) return alert('ต้องมีอย่างน้อย 3 ตัว');

    const arr = val.split('');

    const c2 = uniqueCombo(arr,2);
    const c3 = uniqueCombo(arr,3);
    const c2d = comboWithRepeat(arr,2);
    const c3d = comboWithRepeat(arr,3);

    document.getElementById('result').innerHTML =
        block('2 ตัว ไม่เบิ้ล',c2) +
        block('3 ตัว ไม่เบิ้ล',c3) +
        block('2 ตัว รวมเบิ้ล',c2d) +
        block('3 ตัว รวมเบิ้ล',c3d);
}

function run2() {
    const val = document.getElementById('input').value;
    if (val.length !== 2) return alert('ใส่ 2 ตัว');

    let out = [];
    for (let i=0;i<=9;i++) out.push(val+i);

    document.getElementById('result').innerHTML = block('ชุดลาก',out);
}

function clearAll() {
    document.getElementById('input').value='';
    document.getElementById('result').innerHTML='';
}
</script>
</body>
</html>
